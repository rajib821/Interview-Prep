# ===============================
# Gateway Routes
# ===============================

spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://FEIGN-ORDER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/order/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=payment-service
spring.cloud.gateway.routes[1].uri=lb://FEIGN-PAYMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/payment/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1


# ===============================
# Eureka
# ===============================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
