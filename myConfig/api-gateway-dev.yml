spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: order-service
          uri: lb://feign-order-service
          predicates:
            - Path=/api/order/*
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: lb://feign-payment-service
          predicates:
            - Path=/api/payment/*
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8085
