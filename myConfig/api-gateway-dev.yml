spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        - id: order-service
          uri: lb://feign-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: lb://feign-payment-service-1
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1

        - id: order-rate-limit
          uri: lb://feign-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

server:
  port: 8085
